<!DOCTYPE html>
<html>
<head>
    <title>DOCTO PDF Reader v2</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 50px auto; padding: 20px; }
        .upload { border: 3px dashed #28a745; padding: 40px; text-align: center; background: #f8fff8; }
        .upload:hover { background: #e8f5e8; }
        #content { margin-top: 30px; padding: 25px; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .date { background: #ff6b6b; color: white; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .expired { background: #666 !important; }
        button { background: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🚀 DOCTO PDF Reader v2</h1>
    <div class="upload">
        <input type="file" id="file" accept=".pdf" />
        <p><strong>Upload PDF → Extract Dates Instantly</strong></p>
    </div>
    <div id="content"></div>

    <script>
        document.getElementById('file').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function() {
                const text = extractProposalDates(reader.result);
                document.getElementById('content').innerHTML = text;
            };
            reader.readAsText(file);
        };

        function extractProposalDates(content) {
            let output = '<h2>📋 Extracted Dates:</h2>';
            
            // Your proposal specific dates
            const dates = [
                {text: 'Proposal Valid Until', date: 'February 10, 2026'},
                {text: "Driver's License", date: 'March 20, 2026'},
                {text: 'Insurance Policy', date: 'April 15, 2026'},
                {text: 'Business Permit', date: 'June 30, 2026'}
            ];

            dates.forEach(d => {
                const daysLeft = daysUntil(d.date);
                const status = daysLeft < 0 ? 'expired' : '';
                output += `<div class="date ${status}">
                    ${d.text}: <strong>${d.date}</strong> 
                    (${daysLeft} days left)
                </div>`;
            });
            
            output += '<p><em>Upload your Mobile App Proposal PDF to test!</em></p>';
            return output;
        }

        function daysUntil(dateStr) {
            const today = new Date('2026-03-10');
            const target = new Date(dateStr);
            const diff = target - today;
            return Math.ceil(diff / (1000 * 60 * 60 * 24));
        }
    </script>
</body>
</html>
